    :root {
      --primary: #00357f;
      --primary-container: #0047ab;
      --secondary: #a0f399;
      --on-primary: #ffffff;
      --on-surface: #191c1d;
      --on-surface-variant: #40484c;
      --surface-container-lowest: #ffffff;
      --surface-container-low: #f5f7f8;
      --error: #ba1a1a;
      --radius-xl: 1rem;

    * {

      padding: 0;
      box-sizing: border-box;
    }
    
    body {

      color: var(--on-surface);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .error-container {
      flex: 1;

      padding: 2rem 1rem;
    }
    
    .error-content {
      max-width: 600px;
      text-align: center;
    }
    
    .error-code {

      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 900;
      color: var(--primary);
      line-height: 1;

      font-size: clamp(3rem, 8vw, 5rem);

    }
    
    .error-title {
      font-family: var(--font-headline);
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 800;
      color: var(--on-surface);
      margin-bottom: 1rem;
    }
    
    .error-description {
      font-size: clamp(1rem, 2vw, 1.125rem);
      color: var(--on-surface-variant);
      margin-bottom: 2rem;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .error-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 400px;
      margin: 0 auto;
    }
    
    @media (min-width: 480px) {

        justify-content: center;
      }
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.875rem 1.5rem;
      border-radius: var(--radius-xl);
      font-family: var(--font-headline);

      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }
    
    .btn-primary {
      background-color: var(--primary);
      color: var(--on-primary);
    }

      background-color: var(--primary-container);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 53, 127, 0.3);
    }
    
    .btn-secondary {
      background-color: var(--surface-container-low);
      color: var(--primary);
      border: 2px solid var(--primary);
    }
    
    .btn-secondary:hover {
      background-color: var(--primary);

      transform: translateY(-2px);

    .links-grid {

      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    
    @media (min-width: 480px) {

        grid-template-columns: repeat(4, 1fr);
      }
    }
    
    .helpful-link {

      background-color: var(--surface-container-low);
      border-radius: var(--radius-xl);
      text-decoration: none;
      color: var(--primary);

      font-size: 0.875rem;
      transition: all 0.2s ease;
      text-align: center;
    }
    
    .helpful-link:hover {
